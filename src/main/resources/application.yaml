spring:
  application:
    name: backend

  # --- POSTGRESQL CONFIG ---
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --- MONGODB CONFIG ---
  data:
    mongodb:
      uri: ${MONGO_URI}

  # --- REDIS CONFIG ---
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}

  # --- FILE UPLOAD SIZES ---
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  server:
    tomcat:
      max-http-form-post-size: 15MB

# --- CUSTOM SECURITY & CORS CONFIG ---
jwt:
  secret: ${JWT_SECRET}

frontend:
  url: ${FRONTEND_URL}

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent